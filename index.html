<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ドローンおばけ退治</title>
<style>
  @font-face {
    font-family: 'BIZ UDPGothic';
    src: url('https://cdn.jsdelivr.net/fontsource/fonts/biz-udpgothic@latest/japanese-400-normal.woff2') format('woff2');
    font-weight: 400; font-display: swap;
  }
  @font-face {
    font-family: 'BIZ UDPGothic';
    src: url('https://cdn.jsdelivr.net/fontsource/fonts/biz-udpgothic@latest/japanese-700-normal.woff2') format('woff2');
    font-weight: 700; font-display: swap;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100dvh; overflow:hidden; background:#05050a;
    font-family:"BIZ UDPGothic","Hiragino Sans",sans-serif; touch-action:none;
    -webkit-user-select:none; user-select:none; overscroll-behavior:none; }
  #app { position:fixed; inset:0; }
  canvas { display:block; touch-action:none; }

  /* ---- HUD ---- */
  #hud { position:fixed; inset:0; z-index:10; pointer-events:none; }
  #roomName { position:absolute; top:64px; left:50%; transform:translateX(-50%);
    font-size:clamp(15px,2.6vw,20px); letter-spacing:.22em; color:#f0e6c8; opacity:0;
    text-shadow:0 0 14px rgba(0,0,0,.9), 0 0 26px rgba(255,210,120,.35); transition:opacity .6s; }
  .hudPanel { position:absolute; background:rgba(16,12,32,.62); border:1px solid rgba(150,130,220,.35);
    border-radius:12px; color:#f0e8d0; backdrop-filter:blur(3px); box-shadow:0 2px 10px rgba(0,0,0,.35); }
  #countPanel { top:max(12px,env(safe-area-inset-top)); left:14px; padding:8px 14px; }
  #countPanel .stage { font-size:13px; font-weight:700; opacity:.85; }
  #countPanel .count { font-size:19px; font-weight:700; margin-top:2px; }
  #timerPanel { top:max(12px,env(safe-area-inset-top)); right:14px; padding:8px 14px; text-align:right; }
  #timerPanel .label { font-size:11px; opacity:.75; }
  #timerPanel .time { font-size:19px; font-weight:700; letter-spacing:1px; }
  #toast { position:absolute; left:50%; top:40%; transform:translateX(-50%) scale(.9);
    font-size:clamp(15px,3vw,20px); color:#ffe27a; letter-spacing:.1em; opacity:0; text-align:center;
    text-shadow:0 0 18px rgba(255,190,60,.7), 0 2px 6px rgba(0,0,0,.9);
    transition:opacity .5s, transform .5s; white-space:nowrap; }
  #toast.show { opacity:1; transform:translateX(-50%) scale(1); }

  /* ---- 視点切替ボタン ---- */
  #viewBtn { position:fixed; z-index:22; top:max(66px,calc(env(safe-area-inset-top) + 54px)); right:14px;
    min-width:44px; min-height:44px; padding:8px 12px; border-radius:12px; pointer-events:auto;
    border:1px solid rgba(160,140,230,.5); background:rgba(24,20,48,.7); color:#e0d8f5;
    font-size:13px; font-family:inherit; font-weight:700; letter-spacing:.04em; }
  #viewBtn:active { transform:scale(.96); }

  #audioBtn { position:fixed; z-index:22; top:max(66px,calc(env(safe-area-inset-top) + 54px)); right:120px;
    width:44px; height:44px; border-radius:12px; pointer-events:auto; cursor:pointer;
    border:1px solid rgba(160,140,230,.5); background:rgba(24,20,48,.7); color:#d8d0f0; font-size:18px; }

  /* ---- ゲージ ---- */
  #gaugeLayer { position:fixed; inset:0; pointer-events:none; z-index:8; }
  .ghostGauge { position:absolute; width:44px; height:44px; margin:-56px 0 0 -22px; border-radius:50%;
    border:2px solid rgba(255,255,255,.6); box-shadow:0 0 10px rgba(255,240,180,.6);
    display:flex; align-items:center; justify-content:center; }
  .ghostGauge::after { content:""; width:32px; height:32px; border-radius:50%; background:rgba(16,12,30,.55); }

  /* ---- スティック ---- */
  #controls { position:fixed; inset:0; z-index:20; pointer-events:none; }
  .stick { position:absolute; bottom:max(22px,env(safe-area-inset-bottom)); width:124px; height:124px;
    border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.10), rgba(255,255,255,.03));
    border:2px solid rgba(200,190,240,.4); pointer-events:auto; touch-action:none; }
  #stickLeft { left:20px; } #stickRight { right:20px; }
  .stickKnob { position:absolute; left:50%; top:50%; width:54px; height:54px; margin:-27px 0 0 -27px;
    border-radius:50%; background:radial-gradient(circle at 35% 30%, #dcd0ff, #9a7be0 70%, #6a4db0);
    box-shadow:0 2px 6px rgba(0,0,0,.45); transition:transform .05s linear; }
  .stickLabel { position:absolute; top:-22px; left:0; right:0; text-align:center; color:#d8d0f0;
    font-size:12px; opacity:.8; pointer-events:none; }

  /* ---- オーバーレイ ---- */
  .overlay { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px; color:#e8e2d0;
    background:radial-gradient(ellipse at 50% 35%, #17142e 0%, #0a0916 55%, #030308 100%); transition:opacity .6s; }
  .overlay.hidden { opacity:0; pointer-events:none; }
  .panel { max-width:520px; }
  .panel h1 { font-size:clamp(24px,5vw,40px); letter-spacing:.14em; font-weight:700; margin-bottom:10px;
    text-shadow:0 0 24px rgba(255,215,130,.45), 0 0 60px rgba(120,90,255,.3); }
  .panel h2 { font-size:clamp(20px,4vw,28px); margin-bottom:12px; color:#ffe38a; }
  .panel .sub { font-size:clamp(13px,2.2vw,15px); color:#b9b0d8; letter-spacing:.08em; margin-bottom:16px; }
  .panel p { font-size:15px; line-height:1.9; color:#d8cfe8; }
  .controlHint { display:flex; justify-content:center; gap:14px; margin:18px 0; flex-wrap:wrap; }
  .controlHint div { background:rgba(255,255,255,.07); border-radius:10px; padding:9px 13px; min-width:100px;
    font-size:12.5px; line-height:1.6; }
  .bigBtn { margin-top:8px; min-height:54px; padding:14px 44px; font-size:17px; font-weight:700; letter-spacing:.1em;
    border-radius:27px; border:1px solid #8f7bd8; cursor:pointer; color:#ffe9b8; font-family:inherit;
    background:linear-gradient(180deg,#3a2f66,#241c45); box-shadow:0 0 18px rgba(140,110,255,.35), inset 0 1px 0 rgba(255,255,255,.15);
    transition:transform .15s, box-shadow .15s; }
  .bigBtn:active { transform:scale(.97); }
  #loadingMsg { font-size:13px; color:#7a72a0; margin-top:14px; }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div class="hudPanel" id="countPanel">
    <div class="stage" id="hudStage">ステージ 1</div>
    <div class="count" id="hudCount">👻 退治 0 / 4</div>
  </div>
  <div class="hudPanel" id="timerPanel">
    <div class="label">のこり時間</div>
    <div class="time" id="hudTimer">02:00</div>
  </div>
  <div id="roomName"></div>
  <div id="toast"></div>
</div>

<button id="viewBtn">視点：ドローン</button>
<button id="audioBtn" title="音の切り替え">🔊</button>

<div id="gaugeLayer"></div>

<div id="controls">
  <div class="stick" id="stickLeft">
    <div class="stickLabel">たかさ、むき</div>
    <div class="stickKnob" id="knobLeft"></div>
  </div>
  <div class="stick" id="stickRight">
    <div class="stickLabel">前後・左右</div>
    <div class="stickKnob" id="knobRight"></div>
  </div>
</div>

<div class="overlay" id="startScreen">
  <div class="panel">
    <h1>ドローンおばけ退治</h1>
    <div class="sub">— 星霜魔法学校の夜の城で —</div>
    <p>ドローンをそっと飛ばして、城のあちこちに<br>ういている おばけたちを、やさしい光で照らそう。<br>ライトはつけっぱなし。光をあて続けると、ふわっと消えていくよ。</p>
    <div class="controlHint">
      <div>🕹️左<br>のぼる・さがる<br>右で右旋回</div>
      <div>🕹️右<br>まえ・うしろ<br>みぎ・ひだり</div>
      <div>👁️視点ボタン<br>追従⇄ドローン<br>の切り替え</div>
    </div>
    <button class="bigBtn" id="startBtn">城 に 入 る</button>
    <div id="loadingMsg">準備中…</div>
  </div>
</div>

<div class="overlay hidden" id="clearScreen">
  <div class="panel">
    <h2 id="clearTitle">ステージクリア！</h2>
    <p id="clearText"></p>
    <button class="bigBtn" id="nextBtn">つぎへ</button>
  </div>
</div>

<div class="overlay hidden" id="finalScreen">
  <div class="panel">
    <h2>🏰 城ぜんぶ あかるくなった！ 🏰</h2>
    <p id="finalText">すべてのおばけが、やすらかに消えていきました。<br>星霜魔法学校は、あたたかな光につつまれています。</p>
    <button class="bigBtn" id="restartBtn">もういちど遊ぶ</button>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* =========================================================
   基盤
========================================================= */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0a1c);
scene.fog = new THREE.FogExp2(0x0c0a1c, 0.020);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 300);
camera.rotation.order = 'YXZ';

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const ambient = new THREE.AmbientLight(0x4a4570, 1.1);
scene.add(ambient);
const moonLight = new THREE.DirectionalLight(0x8fa8ff, 0.5);
moonLight.position.set(40, 60, -50);
scene.add(moonLight);

/* =========================================================
   プロシージャルテクスチャ (提供マップより)
========================================================= */
function canvasTex(size, draw) {
  const c = document.createElement('canvas'); c.width = c.height = size;
  draw(c.getContext('2d'), size);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function noiseOver(g, s, n, alpha) {
  for (let i=0;i<n;i++) {
    const v = Math.floor(Math.random()*70);
    g.fillStyle = `rgba(${v},${v},${v},${alpha})`;
    g.fillRect(Math.random()*s, Math.random()*s, 2+Math.random()*4, 2+Math.random()*4);
  }
}
function drawStone(g, s) {
  g.fillStyle = '#585866'; g.fillRect(0,0,s,s);
  const rows = 6, bh = s/rows;
  for (let r=0;r<rows;r++) {
    const off = (r%2)*(s/6);
    for (let cx=-1;cx<4;cx++) {
      const x = cx*(s/3)+off, y = r*bh;
      const tone = 78 + Math.floor(Math.random()*26);
      g.fillStyle = `rgb(${tone},${tone},${tone+10})`;
      g.fillRect(x+3, y+3, s/3-6, bh-6);
    }
  }
  g.strokeStyle = 'rgba(20,20,30,.6)'; g.lineWidth = 3;
  for (let r=0;r<=rows;r++) { g.beginPath(); g.moveTo(0,r*bh); g.lineTo(s,r*bh); g.stroke(); }
  noiseOver(g, s, 500, .08);
}
function drawFloorStone(g, s) {
  g.fillStyle = '#4a4a56'; g.fillRect(0,0,s,s);
  const n = 4, t = s/n;
  for (let i=0;i<n;i++) for (let j=0;j<n;j++) {
    const tone = 66 + Math.floor(Math.random()*22);
    g.fillStyle = `rgb(${tone},${tone},${tone+8})`;
    g.fillRect(i*t+2, j*t+2, t-4, t-4);
  }
  noiseOver(g, s, 600, .07);
}
function drawWood(g, s) {
  g.fillStyle = '#5a3d24'; g.fillRect(0,0,s,s);
  for (let i=0;i<24;i++) {
    g.strokeStyle = `rgba(${30+Math.random()*40},${18+Math.random()*22},8,.5)`;
    g.lineWidth = 1+Math.random()*3;
    g.beginPath(); g.moveTo(0, Math.random()*s);
    g.bezierCurveTo(s*.3, Math.random()*s, s*.6, Math.random()*s, s, Math.random()*s);
    g.stroke();
  }
  for (let p=1;p<4;p++) { g.strokeStyle='rgba(15,8,4,.7)'; g.lineWidth=2;
    g.beginPath(); g.moveTo(0,p*s/4); g.lineTo(s,p*s/4); g.stroke(); }
}
function drawBooks(g, s) {
  g.fillStyle = '#2c1c10'; g.fillRect(0,0,s,s);
  const shelves = 4, sh = s/shelves;
  const palette = ['#7a2e2e','#2e4a7a','#3d6b3a','#7a5a2e','#5a2e6b','#8a7440','#40606a','#6b3a3a'];
  for (let r=0;r<shelves;r++) {
    let x = 4;
    while (x < s-8) {
      const w = 8+Math.random()*14, h = sh*0.72 + Math.random()*sh*0.16;
      g.fillStyle = palette[Math.floor(Math.random()*palette.length)];
      g.fillRect(x, (r+1)*sh - h - 4, w, h);
      g.fillStyle = 'rgba(255,230,160,.25)';
      g.fillRect(x+2, (r+1)*sh - h + 4, w-4, 2);
      x += w + 2;
    }
    g.fillStyle = '#1a0f08'; g.fillRect(0, (r+1)*sh-4, s, 4);
  }
}
function drawTapestry(g, s, base, accent) {
  g.fillStyle = base; g.fillRect(0,0,s,s);
  g.strokeStyle = accent; g.lineWidth = 6; g.strokeRect(14,14,s-28,s-28);
  g.beginPath(); g.arc(s/2, s/2, s*0.2, 0, Math.PI*2); g.stroke();
  g.beginPath();
  for (let i=0;i<8;i++) { const a = i/8*Math.PI*2; g.moveTo(s/2, s/2); g.lineTo(s/2+Math.cos(a)*s*0.3, s/2+Math.sin(a)*s*0.3); }
  g.lineWidth = 3; g.stroke();
  g.fillStyle = accent; g.beginPath(); g.arc(s/2, s/2, s*0.06, 0, Math.PI*2); g.fill();
  noiseOver(g, s, 300, .06);
}
function drawGrass(g, s) {
  g.fillStyle = '#24331e'; g.fillRect(0,0,s,s);
  for (let i=0;i<900;i++) {
    const v = 40+Math.random()*40;
    g.fillStyle = `rgba(${v*0.6},${v},${v*0.45},.5)`;
    g.fillRect(Math.random()*s, Math.random()*s, 2, 3+Math.random()*4);
  }
}
function drawFlame(g, s) {
  const grad = g.createRadialGradient(s/2, s*0.62, 2, s/2, s*0.55, s*0.42);
  grad.addColorStop(0, 'rgba(255,255,230,1)');
  grad.addColorStop(0.3, 'rgba(255,210,110,.95)');
  grad.addColorStop(0.7, 'rgba(255,120,30,.55)');
  grad.addColorStop(1, 'rgba(255,60,0,0)');
  g.fillStyle = grad; g.fillRect(0,0,s,s);
}
function drawGlow(g, s, color) {
  const grad = g.createRadialGradient(s/2,s/2,1,s/2,s/2,s/2);
  grad.addColorStop(0, color); grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0,0,s,s);
}
function drawPortrait(g, s) {
  const hues = [[80,60,120],[120,70,50],[50,90,110],[100,90,60]];
  const [r,gr,b] = hues[Math.floor(Math.random()*hues.length)];
  const grad = g.createLinearGradient(0,0,0,s);
  grad.addColorStop(0, `rgb(${r+40},${gr+40},${b+50})`);
  grad.addColorStop(1, `rgb(${r-30},${gr-30},${b-20})`);
  g.fillStyle = grad; g.fillRect(0,0,s,s);
  g.fillStyle = 'rgba(30,20,18,.85)';
  g.beginPath(); g.ellipse(s/2, s*0.72, s*0.26, s*0.3, 0, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(s/2, s*0.4, s*0.15, 0, Math.PI*2); g.fill();
  g.fillStyle = 'rgba(255,240,210,.16)';
  g.beginPath(); g.arc(s/2, s*0.4, s*0.13, 0, Math.PI*2); g.fill();
  noiseOver(g, s, 250, .1);
}
function drawWindow(g, s) {
  const grad = g.createLinearGradient(0,0,0,s);
  grad.addColorStop(0, '#1c2a5e'); grad.addColorStop(0.5, '#2c3f80'); grad.addColorStop(1, '#141d40');
  g.fillStyle = grad; g.fillRect(0,0,s,s);
  g.fillStyle = 'rgba(240,246,255,.9)';
  g.beginPath(); g.arc(s*0.68, s*0.24, s*0.09, 0, Math.PI*2); g.fill();
  g.fillStyle = 'rgba(255,255,255,.7)';
  for (let i=0;i<26;i++) g.fillRect(Math.random()*s, Math.random()*s, 2, 2);
  g.strokeStyle = '#0a0a14'; g.lineWidth = 8; g.strokeRect(4,4,s-8,s-8);
  g.beginPath(); g.moveTo(s/2,0); g.lineTo(s/2,s); g.moveTo(0,s/2); g.lineTo(s,s/2); g.stroke();
}

const TEX = {
  flame: canvasTex(128, drawFlame),
  glowWarm: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(255,215,130,.9)')),
  glowGreen: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(120,255,150,.9)')),
  glowPurple: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(200,140,255,.9)')),
  glowBlue: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(140,180,255,.9)')),
  window: canvasTex(256, drawWindow),
};
const baseStone = canvasTex(256, drawStone);
const baseFloor = canvasTex(256, drawFloorStone);
const baseWood  = canvasTex(256, drawWood);
const baseGrass = canvasTex(256, drawGrass);
const baseBooks = canvasTex(256, drawBooks);

function repTex(base, rx, ry) { const t = base.clone(); t.needsUpdate = true; t.repeat.set(rx, ry); return t; }
function stoneMat(w, h, tint) { return new THREE.MeshLambertMaterial({ map:repTex(baseStone, Math.max(1,w/4), Math.max(1,h/4)), color: tint || 0xffffff }); }
function woodMat(w, h) { return new THREE.MeshLambertMaterial({ map:repTex(baseWood, Math.max(1,w/2), Math.max(1,h/2)) }); }

/* =========================================================
   当たり判定 / 壁ビルダー (提供マップより)
========================================================= */
const colliders = [];   // {minX,maxX,minZ,maxZ}
function addCollider(minX, maxX, minZ, maxZ) { colliders.push({ minX, maxX, minZ, maxZ }); }

const WALL_T = 0.45;
const CEIL_MIN = 4.0; // 天井のおおよその最低高さ(おばけ生成の上限に使う)
const wallGroup = new THREE.Group(); scene.add(wallGroup);

function wallSegments(a, b, height, doors) {
  const list = [];
  const ds = [...doors].sort((p,q)=>p.at-q.at);
  let cur = a;
  for (const d of ds) {
    const dw = d.w ?? 2.2, dh = d.h ?? 3.0;
    const s = Math.max(a, d.at - dw/2), e = Math.min(b, d.at + dw/2);
    if (s > cur + 0.01) list.push({ from:cur, to:s, y0:0, h:height });
    if (height > dh + 0.05) list.push({ from:s, to:e, y0:dh, h:height-dh });
    cur = e;
  }
  if (cur < b - 0.01) list.push({ from:cur, to:b, y0:0, h:height });
  return list;
}
function buildWallX(z, x1, x2, height, doors=[], tint) {
  for (const sg of wallSegments(x1, x2, height, doors)) {
    const len = sg.to - sg.from;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, sg.h, WALL_T), stoneMat(len, sg.h, tint));
    mesh.position.set((sg.from+sg.to)/2, sg.y0 + sg.h/2, z);
    wallGroup.add(mesh);
    // ドア上部の「まぐさ」(y0>0)は当たり判定に含めない(2D判定なのでドアが塞がってしまうため)
    if (sg.y0 === 0) addCollider(sg.from, sg.to, z-WALL_T/2, z+WALL_T/2);
  }
}
function buildWallZ(x, z1, z2, height, doors=[], tint) {
  for (const sg of wallSegments(z1, z2, height, doors)) {
    const len = sg.to - sg.from;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(WALL_T, sg.h, len), stoneMat(len, sg.h, tint));
    mesh.position.set(x, sg.y0 + sg.h/2, (sg.from+sg.to)/2);
    wallGroup.add(mesh);
    if (sg.y0 === 0) addCollider(x-WALL_T/2, x+WALL_T/2, sg.from, sg.to);
  }
}

function addFloor(x1, x2, z1, z2, base, tint, texScale=4) {
  const w = x2-x1, d = z2-z1;
  const mat = new THREE.MeshLambertMaterial({ map:repTex(base, w/texScale, d/texScale), color:tint||0xffffff });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set((x1+x2)/2, 0.01, (z1+z2)/2);
  scene.add(mesh);
  return mesh;
}
function addCeiling(x1, x2, z1, z2, y, tint) {

function makeFlame(x, y, z, scale=0.5) {
  const mat = new THREE.SpriteMaterial({ map:TEX.flame, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true });
  const s = new THREE.Sprite(mat);
  s.position.set(x, y, z); s.scale.set(scale, scale*1.4, 1);
  decoGroup.add(s);
  flames.push({ sprite:s, base:scale, speed:6+Math.random()*5, phase:Math.random()*10 });
  return s;
}
function makeGlow(x, y, z, tex, scale=1.6, opacity=0.5) {
  const mat = new THREE.SpriteMaterial({ map:tex, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity });
  const s = new THREE.Sprite(mat);
  s.position.set(x, y, z); s.scale.set(scale, scale, 1);
  decoGroup.add(s); return s;
}
function makeFlickerLight(x, y, z, color, intensity, dist, amp=0.25) {
  const l = new THREE.PointLight(color, intensity, dist, 1.6);
  l.position.set(x, y, z); scene.add(l);

function makeTable(x, z, w, d, h=0.85, ry=0) {
  const g = new THREE.Group();
  const top = new THREE.Mesh(new THREE.BoxGeometry(w, 0.09, d), woodMat(w, d));
  top.position.y = h; g.add(top);
  const legGeo = new THREE.BoxGeometry(0.1, h, 0.1);
  const legMat = new THREE.MeshLambertMaterial({ color:0x3c2a16 });
  for (const [sx, sz] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(sx*(w/2-0.12), h/2, sz*(d/2-0.12)); g.add(leg);
  }
  g.position.set(x, 0, z); g.rotation.y = ry; decoGroup.add(g);
  const rot = Math.abs(Math.sin(ry)) > 0.5;
  const cw = rot ? d : w, cd = rot ? w : d;
  addCollider(x-cw/2, x+cw/2, z-cd/2, z+cd/2);
  return g;
}

  makeFlame(x, y + 0.24*scale, z, 0.22*scale);

}

    new THREE.MeshLambertMaterial({ map:repTex(baseBooks, Math.max(1, w/2.2), Math.max(1, h/2.4)) }));
  face.position.set(0, h/2, 0.26); g.add(face);

function resolveCollisions(pos, r) {
  for (const c of colliders) {
    const nx = Math.max(c.minX, Math.min(pos.x, c.maxX));
    const nz = Math.max(c.minZ, Math.min(pos.z, c.maxZ));
    let dx = pos.x - nx, dz = pos.z - nz;
    const d2 = dx*dx + dz*dz;
    if (d2 >= r*r) continue;
    if (d2 > 1e-8) {
      const d = Math.sqrt(d2), push = r - d;
      pos.x += dx/d*push; pos.z += dz/d*push;
    } else {
      const pxMin = pos.x - c.minX + r, pxMax = c.maxX - pos.x + r;
      const pzMin = pos.z - c.minZ + r, pzMax = c.maxZ - pos.z + r;
      const m = Math.min(pxMin, pxMax, pzMin, pzMax);
      if (m === pxMin) pos.x = c.minX - r;
      else if (m === pxMax) pos.x = c.maxX + r;
      else if (m === pzMin) pos.z = c.minZ - r;
      else pos.z = c.maxZ + r;
    }
  }
}

function makeStick(baseEl, knobEl) {
  const state = { x:0, y:0, active:false, pointerId:null };
  const radius = 40;
  function update(cx, cy) {
    const rect = baseEl.getBoundingClientRect();
    const bx = rect.left + rect.width/2, by = rect.top + rect.height/2;
    let dx = cx - bx, dy = cy - by;
    const dist = Math.hypot(dx, dy);
    if (dist > radius) { dx = dx/dist*radius; dy = dy/dist*radius; }
    knobEl.style.transform = `translate(${dx}px, ${dy}px)`;
    state.x = dx/radius; state.y = dy/radius;
  }
  function reset() { state.x=0; state.y=0; state.active=false; state.pointerId=null; knobEl.style.transform='translate(0px,0px)'; }
  baseEl.addEventListener('pointerdown', e => { e.preventDefault(); ensureAudio(); state.active=true; state.pointerId=e.pointerId; baseEl.setPointerCapture(e.pointerId); update(e.clientX,e.clientY); });
  baseEl.addEventListener('pointermove', e => { if (!state.active || e.pointerId!==state.pointerId) return; e.preventDefault(); update(e.clientX,e.clientY); });
  const end = e => { if (e.pointerId===state.pointerId) reset(); };
  baseEl.addEventListener('pointerup', end);
  baseEl.addEventListener('pointercancel', end);
  return state;
}

});
function ensureAudio() {
  if (actx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  actx = new AC();
  master = actx.createGain(); master.gain.value = 0.9; master.connect(actx.destination);
  startBgm();
}
function tone(freq, dur, type='sine', vol=0.2, delay=0) {
  if (!actx || !audioOn) return;
  const t0 = actx.currentTime + delay;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.05);
}
function sfxDefeatChime() { [660,880,1100,1320].forEach((f,i)=>tone(f,0.5,'sine',0.16,i*0.08)); }
function sfxStageClear() { [523,659,784,1046].forEach((f,i)=>tone(f,0.6,'triangle',0.18,i*0.12)); }
function sfxBump() { tone(90, 0.16, 'triangle', 0.14); }

/* オルゴール風のやさしいBGM(単発ノートの繰り返しなので「ブーン」という持続音にならない) */
let bgmTimer = null;
function startBgm() {
  const scale = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50]; // Cメジャーペンタトニック風
  const melody = [0,2,4,3,2,1,0,2,4,5,4,2,1,0,2,3];
  let step = 0;
  function playNote() {
    if (!actx || actx.state === 'closed') return;
    if (audioOn) {
      const cycle = Math.floor(step / melody.length) % 2;
      const idx = melody[step % melody.length];
      const freq = scale[idx] * (cycle === 1 ? 0.5 : 1); // 2周目はオクターブ下げて変化をつける
      const now = actx.currentTime;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(freq, now);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.075, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 1.7);
      o.connect(g); g.connect(master);
      o.start(now); o.stop(now + 1.8);
      // やわらかいハモリ(5度上、控えめ)
      if (step % 4 === 0) {
        const o2 = actx.createOscillator(), g2 = actx.createGain();
        o2.type = 'sine'; o2.frequency.setValueAtTime(freq * 1.5, now + 0.05);
        g2.gain.setValueAtTime(0.0001, now + 0.05);
        g2.gain.exponentialRampToValueAtTime(0.035, now + 0.08);
        g2.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
        o2.connect(g2); g2.connect(master);
        o2.start(now + 0.05); o2.stop(now + 1.7);
      }
    }
    step++;
    bgmTimer = setTimeout(playNote, 880);
  }
  playNote();
}

/* =========================================================
   ゲージ表示
========================================================= */
function updateGauges() {
  ghosts.forEach((g) => {
    if (g.dead) { if (g.gaugeEl) { g.gaugeEl.remove(); g.gaugeEl=null; } return; }
    if (g.lightTime > 0.05) {
      if (!g.gaugeEl) { g.gaugeEl = document.createElement('div'); g.gaugeEl.className='ghostGauge'; gaugeLayer.appendChild(g.gaugeEl); }
      const wp = g.group.position.clone(); wp.y += 0.9; wp.project(camera);
      const sx = (wp.x*0.5+0.5)*window.innerWidth, sy = (-wp.y*0.5+0.5)*window.innerHeight;
      g.gaugeEl.style.left = sx+'px'; g.gaugeEl.style.top = sy+'px';
      const pct = Math.min(1, g.lightTime/DEFEAT_TIME)*360;
      g.gaugeEl.style.background = `conic-gradient(#fff3b0 ${pct}deg, rgba(255,255,255,0.15) ${pct}deg)`;
      g.gaugeEl.style.display = (wp.z > 1) ? 'none' : 'flex';
    } else if (g.gaugeEl) { g.gaugeEl.remove(); g.gaugeEl=null; }
  });
}

/* =========================================================
   毎フレーム更新
========================================================= */
let bumpCooldown = 0;
function stepGame(dt) {
  const kb = keyboardAxes();
  const lx = leftStick.x + kb.lx, ly = leftStick.y + kb.ly;
  const rx = rightStick.x + kb.rx, ry = rightStick.y + kb.ry;

  // ヨー(旋回): 右で右旋回
  drone.yaw -= lx * YAW_SPEED * dt;
  drone.facing.set(-Math.sin(drone.yaw), 0, -Math.cos(drone.yaw));

  const fX = drone.facing.x, fZ = drone.facing.z;
  const rX = Math.cos(drone.yaw), rZ = -Math.sin(drone.yaw);
  const pitch = -ry;  // 右スティック上(y<0)で前進
  const roll = rx;    // 右スティック右(x>0)で右移動

  drone.vel.x += (fX*pitch + rX*roll) * MOVE_ACCEL * dt;
  drone.vel.z += (fZ*pitch + rZ*roll) * MOVE_ACCEL * dt;
  drone.vel.y += (-ly) * ALT_ACCEL * dt;

  // 減衰(ゆったり)
  const damp = Math.pow(DAMPING, dt*60);
  drone.vel.x *= damp; drone.vel.z *= damp; drone.vel.y *= damp;

  const hs = Math.hypot(drone.vel.x, drone.vel.z);
  if (hs > MOVE_MAX_SPEED) { const s = MOVE_MAX_SPEED/hs; drone.vel.x*=s; drone.vel.z*=s; }
  drone.vel.y = Math.max(-ALT_MAX_SPEED, Math.min(ALT_MAX_SPEED, drone.vel.y));

  const prevX = drone.pos.x, prevZ = drone.pos.z;
  drone.pos.x += drone.vel.x * dt;
  drone.pos.z += drone.vel.z * dt;
  drone.pos.y += drone.vel.y * dt;

  // 壁の当たり判定(水平のみ)
  resolveCollisions(drone.pos, DRONE_RADIUS);
  // 押し戻された = ぶつかった → 効果音 & 軽く速度を殺す
  if (bumpCooldown > 0) bumpCooldown -= dt;
  const corrected = Math.hypot(drone.pos.x - (prevX + drone.vel.x*dt), drone.pos.z - (prevZ + drone.vel.z*dt));
  if (corrected > 0.02) {
    drone.vel.x *= 0.3; drone.vel.z *= 0.3;
    if (bumpCooldown <= 0 && hs > 0.6) { sfxBump(); bumpCooldown = 0.25; }
  }

  // 高さクランプ(部屋の天井まで)
  const ceil = currentCeilY() - 0.5;
  if (drone.pos.y < MIN_Y) { drone.pos.y = MIN_Y; if (drone.vel.y<0) drone.vel.y=0; }
  if (drone.pos.y > ceil) { drone.pos.y = ceil; if (drone.vel.y>0) drone.vel.y=0; }

  // 場外セーフティ
  drone.pos.x = Math.max(-48.6, Math.min(41.6, drone.pos.x));
  drone.pos.z = Math.max(-32.6, Math.min(32.6, drone.pos.z));

  droneGroup.position.copy(drone.pos);
  droneGroup.rotation.y = drone.yaw;

  // 傾き演出
  droneBodyMesh.rotation.z += (-roll*0.35 - droneBodyMesh.rotation.z)*0.2;
  droneBodyMesh.rotation.x += (pitch*0.25 - droneBodyMesh.rotation.x)*0.2;

  // ライト(常時ON)
  droneSpot.position.copy(droneGroup.position);
  droneSpot.target.position.copy(droneGroup.position.clone().add(drone.facing.clone().multiplyScalar(LIGHT_RANGE)));
  droneSpot.intensity = 3.6;

  // おばけAI + 照射判定
  ghosts.forEach(g => {
    if (g.dead) return;
    const target = g.waypoints[g.wpIndex];
    const dir = target.clone().sub(g.group.position);
    const dist = dir.length();
    if (dist < 0.2) { g.wpIndex = (g.wpIndex+1) % g.waypoints.length; }
    else { dir.normalize(); g.group.position.addScaledVector(dir, g.speed*dt); }
    g.bobPhase += dt*1.6;
    g.group.position.y += Math.sin(g.bobPhase)*0.003;
    g.group.rotation.y += (Math.atan2(dir.x, dir.z) - g.group.rotation.y)*0.05;

    // しっぽ(ウィスプ)をゆらゆら揺らす
    const tail = g.group.userData.tailSegments;
    if (tail) {
      tail.forEach((seg, i) => {
        seg.position.x = seg.userData.baseX + Math.sin(elapsed*2.0 + g.bobPhase + i*0.9)*(0.06 + i*0.03);
        seg.position.y = seg.userData.baseY + Math.sin(elapsed*1.5 + g.bobPhase + i*0.6)*0.03;
      });
    }

    const toG = g.group.position.clone().sub(droneGroup.position);
    const d = toG.length();
    let lit = false;
    if (d < LIGHT_RANGE) {
      toG.normalize();
      const angle = Math.acos(THREE.MathUtils.clamp(drone.facing.dot(toG), -1, 1));
      if (angle < LIGHT_HALF_ANGLE) lit = true;
    }
    if (lit) {
      g.lightTime += dt;
      g.group.children[0].material.emissiveIntensity = 0.6 + Math.min(1, g.lightTime/DEFEAT_TIME)*1.6;
      if (g.lightTime >= DEFEAT_TIME) defeatGhost(g);
    } else if (g.lightTime > 0) {
      g.lightTime = Math.max(0, g.lightTime - dt*LIGHT_DECAY_MUL);
      g.group.children[0].material.emissiveIntensity = 0.6 + Math.min(1, g.lightTime/DEFEAT_TIME)*1.6;
    }

    // 照射中リング: 当たっている間は明るく脈打ち、外れるとすっと消える
    const ring = g.group.userData.targetRing;
    if (ring) {
      if (lit) {
        const pulse = 1.35 + Math.sin(elapsed*9)*0.18;
        ring.scale.set(pulse, pulse, 1);
        ring.material.opacity = 0.6 + Math.sin(elapsed*9)*0.25;
      } else {
        ring.material.opacity = Math.max(0, ring.material.opacity - dt*2.5);
      }
    }
  });

  // タイマー
  timeLeft -= dt; updateTimerDisplay();
  if (timeLeft <= 0) { timeLeft = 0; finishStage(false); }
}

/* =========================================================
   メインループ
========================================================= */
const clock = new THREE.Clock();
let elapsed = 0;
function animate() {
  requestAnimationFrame(animate);
  let dt = Math.min(clock.getDelta(), DT_CLAMP);
  dt *= __timeScale;
  elapsed += dt;

  rotors.forEach(r => r.rotation.y += dt*26);

  if (started && stageActive) { stepGame(dt); detectRoom(); }
  if (brightenTween) brightenTween(dt);

  // 雰囲気の遷移
  scene.fog.color.lerp(targetFog, dt*1.5);
  scene.fog.density += (targetFogD - scene.fog.density)*dt*1.5;
  ambient.intensity += (targetAmb - ambient.intensity)*dt*0.6;

  // 炎/光/浮遊/回転
  for (const f of window.__CASTLE.flames) { const s = f.base*(1+Math.sin(elapsed*f.speed+f.phase)*0.14+Math.sin(elapsed*f.speed*2.3)*0.07); f.sprite.scale.set(s, s*1.4, 1); }
  for (const fl of window.__CASTLE.flickers) { fl.light.intensity = fl.base*(1+Math.sin(elapsed*fl.speed+fl.phase)*fl.amp+Math.sin(elapsed*fl.speed*2.7+fl.phase)*fl.amp*0.5); }
  for (const b of window.__CASTLE.bobbers) b.obj.position.y = b.baseY + Math.sin(elapsed*b.speed+b.phase)*b.amp;
  for (const s of window.__CASTLE.spinners) s.obj.rotation.y += s.speed*dt;
  if (window.__water) { window.__water.material.emissiveIntensity = 0.8 + Math.sin(elapsed*1.4)*0.2; window.__water.rotation.z += dt*0.15; }

  updateGhostFades(dt);
  updateParticles(dt);
  updateCamera(dt);
  updateGauges();

  renderer.render(scene, camera);
}

/* =========================================================
   起動 / 画面遷移
========================================================= */
document.getElementById('loadingMsg').textContent = '準備完了';
startBtn.addEventListener('click', () => {
  ensureAudio();
  started = true;
  startScreen.classList.add('hidden');
  startStage(0);
});
nextBtn.addEventListener('click', () => { clearScreen.classList.add('hidden'); startStage(stageIndex+1); });
restartBtn.addEventListener('click', () => { finalScreen.classList.add('hidden'); startStage(0); });

/* =========================================================
   テスト用フック
========================================================= */
let __timeScale = 1;
window.__test = {
  getState: () => ({
    stageIndex, defeatedCount, totalGhosts, timeLeft, stageActive, started,
    ghostCount: ghosts.filter(g=>!g.dead).length,
    dronePos: drone.pos.toArray(), droneYaw: drone.yaw, viewMode,
  }),
  getGhostSceneInfo: () => ({
    aliveCount: ghosts.filter(g=>!g.dead).length,
    fadeInProgressCount: ghostFades.length,
    sceneGhostGroupCount: scene.children.filter(o=>o.isGroup && o.userData && o.userData.isGhost).length,
  }),
  getGhostHeights: () => ghosts.map(g => g.group.position.y),
  getGhostPositions: () => ghosts.map(g => ({ dead: g.dead, pos: g.group.position.toArray() })),
  getGhostRingOpacity: (index=0) => {
    const g = ghosts.filter(gg=>!gg.dead)[index];
    if (!g) return null;
    return g.group.userData.targetRing ? g.group.userData.targetRing.material.opacity : null;
  },
  getGhostRooms: () => ghosts.map(g => g.roomName),
  forceDefeatAll: () => { ghosts.forEach(g=>{ if(!g.dead) defeatGhost(g); }); },
  forceDefeatOne: () => { const g = ghosts.find(g=>!g.dead); if (g) defeatGhost(g); },
  setDronePos: (x,y,z) => { drone.pos.set(x,y,z); drone.vel.set(0,0,0); droneGroup.position.copy(drone.pos); },
  setDroneVelocity: (x,y,z) => { drone.vel.set(x,y,z); },
  setDroneYaw: (yaw) => { drone.yaw = yaw; drone.facing.set(-Math.sin(yaw),0,-Math.cos(yaw)); droneGroup.rotation.y = yaw; },
  getDroneYaw: () => drone.yaw,
  setDroneFacingToGhost: (index=0) => {
    const g = ghosts.filter(gg=>!gg.dead)[index]; if (!g) return false;
    const f = g.group.position.clone().sub(droneGroup.position).normalize();
    drone.facing.copy(f); drone.yaw = Math.atan2(-f.x, -f.z); droneGroup.rotation.y = drone.yaw; return true;
  },
  getViewMode: () => viewMode,
  toggleView: () => viewBtn.click(),
  startStage: (idx) => startStage(idx),
  setTimeScale: (v) => { __timeScale = v; },
  clickStart: () => startBtn.click(),
  clickNext: () => nextBtn.click(),
  getRooms: () => rooms.map(r => r.name),
};

animate();

</script>
